# Agent Configuration

model:
  provider: "openai"  # openai, anthropic
  name: "gpt-4"
  temperature: 0.7
  max_tokens: 2000

agent:
  name: "VacationAgent"
  version: "0.1.0"
  verbose: true

destination:
  default_budget: 2000
  default_duration: 7
  default_travelers: 2

logging:
  level: "INFO"
  file: "logs/vacation_agent.log"
